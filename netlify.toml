# Netlify configuration for Parcel Fox Windhoek
# This ensures proper SPA routing and build optimization

[build]
  # The command to build the site
  command = "npm run build"
  # The directory where the built files are located
  publish = "dist"
  # Environment variables for the build
  environment = { NODE_VERSION = "20" }

# Redirect rules for SPA routing
# This ensures React Router works correctly on page refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
