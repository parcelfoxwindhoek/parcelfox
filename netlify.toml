# Netlify configuration for Parcel Fox Windhoek
# Optimized for the Netlify Prerender extension + SPA routing

[build]
  command = "npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "20" }

# SPA fallback — Prerender extension sits in front of this for crawler UAs
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Global security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long-cache hashed build assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache index.html so Prerender always sees the latest build
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Allow sitemap and robots to be cached briefly
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
